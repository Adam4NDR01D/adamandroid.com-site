<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AddicTEEN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   adam//android, mockup v2
   On-brand rebuild: FF9900 orange · Syne / Space Mono / Comfortaa
   Nav = the three languages: HUMAN / CAMERA / COMPUTER
   >> SWAP real videos in the CONFIG block near the bottom.
   ============================================================ */
:root{
  --bg:#080808;
  --panel:#0f0f0f;
  --panel-2:#151515;
  --line:#1e1e1e;
  --line-2:#2a2a2a;
  --txt:#e2e2e2;
  --txt-2:#8a8a8a;
  --txt-3:#555;
  --acc:#FF9900;          /* brand orange (20-yr) */
  --acc-2:#FF6600;        /* gradient end (20-yr) */
  --acc-dim:#a5641a;
  --amber:#e8975a;        /* complement, secondary accent */
  --green:#00e87a;
  --mono:'Space Mono', ui-monospace, Menlo, monospace;
  --sans:'Syne', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  --display:'Comfortaa', var(--sans);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--txt);font-family:var(--sans);
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;
  background-image:
    linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:44px 44px;
}
.mono{font-family:var(--mono)}
.label{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--txt-3)}
.acc{color:var(--acc)}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;color:inherit}

/* ---------- top app bar ---------- */
.appbar{
  position:sticky;top:0;z-index:50;
  background:rgba(8,8,8,.9);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.appbar-in{max-width:1180px;margin:0 auto;padding:0 24px;height:56px;display:flex;align-items:center;gap:20px;position:relative}
.logo-lockup{display:flex;align-items:center;gap:11px}
.logo-mark{height:44px;width:auto;display:block;flex:0 0 auto}
.brand{font-family:var(--mono);font-weight:700;letter-spacing:.02em;font-size:15px;color:var(--txt)}
.brand .slash{color:var(--acc)}
.rec{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--txt-2);margin-left:auto}
.dot{width:8px;height:8px;border-radius:50%;background:#ff3b3b;box-shadow:0 0 8px #ff3b3b;animation:blink 1.6s infinite}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:.25}}
.tc{font-family:var(--mono);font-size:12px;color:var(--acc);letter-spacing:.06em}
.nav{position:absolute;left:50%;top:0;height:56px;transform:translateX(-50%);display:flex;align-items:center;gap:12px}
.tab{font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--txt-3);cursor:pointer;transition:.15s;white-space:nowrap}
.tab.on{color:var(--acc)}
.tab:hover{color:var(--txt)}
.dot-sep{color:var(--txt-3);font-size:11px}

/* ---------- layout ---------- */
.view{display:none;max-width:1180px;margin:0 auto;padding:44px 24px 90px}
.view.on{display:block;animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.eyebrow .bar{width:22px;height:1px;background:var(--acc)}
.eyebrow .label{text-transform:none}

/* ---------- player frame (shared) ---------- */
.player{
  position:relative;width:100%;aspect-ratio:16/9;background:#000;
  border:1px solid var(--line-2);border-radius:10px;overflow:hidden;
  box-shadow:0 24px 60px -30px rgba(0,0,0,.9);
}
.player .poster{position:absolute;inset:0;background-size:cover;background-position:center;
  filter:saturate(1.05) contrast(1.02)}
.player .scrim{position:absolute;inset:0;background:
  linear-gradient(180deg,rgba(8,8,8,.05) 0%,rgba(8,8,8,.55) 100%)}
.player iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.tv-bars{position:absolute;inset:0;z-index:2;opacity:0;transition:opacity .4s ease;pointer-events:none;display:flex;flex-direction:column}
.smpte-top{flex:0 0 66.7%;background:linear-gradient(90deg,#b3b3b3 0 14.2857%,#b3b300 14.2857% 28.571%,#00b3b3 28.571% 42.857%,#00b300 42.857% 57.143%,#b300b3 57.143% 71.428%,#b30000 71.428% 85.714%,#0000b3 85.714% 100%)}
.smpte-mid{flex:0 0 8%;background:linear-gradient(90deg,#0000b3 0 14.2857%,#131313 14.2857% 28.571%,#b300b3 28.571% 42.857%,#131313 42.857% 57.143%,#00b3b3 57.143% 71.428%,#131313 71.428% 85.714%,#b3b3b3 85.714% 100%)}
.smpte-bot{flex:1 1 auto;background:linear-gradient(90deg,#00214c 0 16.66%,#ffffff 16.66% 33.33%,#2d0057 33.33% 50%,#131313 50% 58.33%,#0a0a0a 58.33% 62.5%,#131313 62.5% 66.66%,#1c1c1c 66.66% 70.83%,#131313 70.83% 85.71%,#b3b3b3 85.71% 100%)}
.tv-snow{position:absolute;inset:0;z-index:2;opacity:0;transition:opacity .35s ease;pointer-events:none;
  image-rendering:pixelated;width:100%;height:100%}
.player .scrim{z-index:3}
.frame-tick{z-index:5}
.play{z-index:6}
.xhair{z-index:6}
.overlay-meta,.under-meta{z-index:6}
.play{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:76px;height:76px;border-radius:50%;border:1px solid #FF9900;
  background:rgba(8,8,8,.4);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;transition:.18s}
.play:hover{background:var(--acc);border-color:var(--acc);transform:translate(-50%,-50%) scale(1.06)}
.play svg{width:26px;height:26px;fill:var(--txt);margin-left:4px}
.play:hover svg{fill:#080808}
.frame-tick{position:absolute;width:14px;height:14px;border:1px solid #FF9900;pointer-events:none}
.ft-tl{top:10px;left:10px;border-right:0;border-bottom:0}
.ft-tr{top:10px;right:10px;border-left:0;border-bottom:0}
.ft-bl{bottom:10px;left:10px;border-right:0;border-top:0}
.ft-br{bottom:10px;right:10px;border-left:0;border-top:0}
.overlay-meta{position:absolute;left:16px;bottom:14px;display:flex;gap:10px;align-items:center;
  font-family:var(--mono);font-size:11px;color:var(--txt-2)}
.overlay-meta .pill{background:rgba(8,8,8,.7);border:1px solid var(--line-2);border-radius:4px;padding:3px 8px}

/* ---------- HOME (HUMAN) hero ---------- */
.hero-grid{display:grid;grid-template-columns:1fr;gap:26px}
.story{max-width:none}
.story h1{font-family:var(--display);font-size:clamp(30px,5vw,54px);line-height:1.05;font-weight:700;letter-spacing:-.01em;margin-bottom:18px}
.story h1 .thin{color:var(--txt-2);font-weight:400}
.story .lede{color:var(--txt);font-size:clamp(17px,2.4vw,21px);max-width:none;font-weight:600}
.story .lede .muted{color:var(--txt-2);font-weight:400;display:block;margin-top:9px}
.story .kicker{margin-top:14px;color:var(--acc);font-family:var(--mono);font-size:13px;letter-spacing:.04em}
.xhair{position:absolute;left:50%;top:50%;width:0;height:0;pointer-events:none;z-index:3}
.xhair span{position:absolute;background:#FF9900}
.xhair .n{width:1px;height:18px;left:-0.5px;top:-64px}
.xhair .s{width:1px;height:18px;left:-0.5px;top:46px}
.xhair .e{height:1px;width:18px;top:-0.5px;left:46px}
.xhair .w{height:1px;width:18px;top:-0.5px;left:-64px}
.under-meta{display:flex;align-items:center;gap:10px;margin-top:12px;flex-wrap:wrap;padding:0 11px}
.under-meta .pill{font-family:var(--mono);font-size:11px;color:var(--txt-2);background:var(--panel);border:1px solid var(--line-2);border-radius:4px;padding:3px 9px}
.under-meta .reel-name{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--txt-3);letter-spacing:.04em}
.rot{font-family:var(--display);font-size:clamp(24px,3.4vw,30px);font-weight:700;margin-bottom:12px;letter-spacing:-.01em;white-space:nowrap}
.rotbox{display:inline-block;width:120px;text-align:right;white-space:nowrap;overflow:visible}
.rot #rotword{color:var(--acc);display:inline-block}

/* our-story payoff */
.payoff{margin-top:64px}
.payoff .label{margin-bottom:14px}
.payoff p{color:var(--txt-2);font-size:16px;max-width:760px}
.payoff .big{margin-top:18px;font-family:var(--display);font-weight:700;font-size:clamp(24px,4vw,38px);
  letter-spacing:-.01em;color:var(--txt);line-height:1.1}
.payoff .big .accw{color:var(--acc)}

/* ---------- sections ---------- */
.section{margin-top:74px}
.sec-head{display:flex;align-items:baseline;gap:14px;margin-bottom:22px;border-bottom:1px solid var(--line);padding-bottom:12px}
.sec-head h2{font-size:13px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--txt);font-weight:700}
.sec-head .idx{font-family:var(--mono);font-size:12px;color:var(--acc)}
.sec-head .rt{margin-left:auto;color:var(--txt-3);font-family:var(--mono);font-size:11px;letter-spacing:.14em}

/* three languages */
.langs{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.lang{display:block;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px 20px;transition:.18s;position:relative;overflow:hidden}
.lang:hover{border-color:var(--acc-dim);transform:translateY(-3px)}
.lang .verb{font-family:var(--mono);font-size:11px;letter-spacing:.16em;color:var(--amber);text-transform:uppercase;opacity:.85}
.lang h3{font-family:var(--display);font-weight:700;font-size:22px;margin:6px 0 12px;letter-spacing:-.01em}
.lang h3 .we{color:var(--acc)}
.lang p{color:var(--txt-2);font-size:14px}
.lang .go{margin-top:16px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--acc);text-transform:uppercase;display:inline-flex;align-items:center;gap:6px}
.lang:hover .go{gap:11px}

/* services grid (COMPUTER) */
.grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.svc{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px 20px;transition:.18s}
.svc:hover{border-color:var(--acc-dim)}
.svc .n{font-family:var(--mono);font-size:11px;color:var(--acc);letter-spacing:.14em}
.svc h3{font-family:var(--display);font-weight:700;font-size:19px;margin:8px 0 10px}
.svc p{color:var(--txt-2);font-size:14px}

/* contact form */
.contact{display:grid;grid-template-columns:1.1fr .9fr;gap:34px;align-items:start}
.contact .blurb h3{font-family:var(--display);font-size:26px;font-weight:700;margin-bottom:12px}
.contact .blurb p{color:var(--txt-2);margin-bottom:16px}
.form{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:22px}
.field{margin-bottom:16px}
.field label{display:block;margin-bottom:7px}
.field input,.field textarea{
  width:100%;background:var(--bg);border:1px solid var(--line-2);border-radius:7px;
  color:var(--txt);padding:11px 12px;font-family:var(--sans);font-size:14px;transition:.15s}
.field input:focus,.field textarea:focus{outline:0;border-color:var(--acc);box-shadow:0 0 0 3px rgba(255,153,0,.12)}
.field textarea{resize:vertical;min-height:96px}
.send{width:100%;background:var(--acc-2);color:#080808;border:0;border-radius:7px;
  padding:13px;font-weight:700;font-family:var(--mono);letter-spacing:.08em;font-size:12px;transition:.15s}
.send:hover{filter:brightness(1.08)}
.send:active{transform:translateY(1px)}

/* featured-on strip */
.logos{display:flex;flex-wrap:wrap;gap:32px;align-items:center}
.logo{flex:0 0 auto;height:19px;width:auto;display:block;filter:brightness(0) invert(1);opacity:.23;transition:.2s}
.logo:hover{opacity:.6}

/* ---------- CAMERA scrubber ---------- */
.camp-head{display:flex;flex-wrap:wrap;gap:20px;align-items:flex-end;margin-bottom:22px}
.camp-head h1{font-family:var(--display);font-size:clamp(26px,4vw,40px);font-weight:700;letter-spacing:-.01em;line-height:1.05}
.camp-head h1 .thin{color:var(--txt-2);font-weight:400}
.meta-panel{margin-left:auto;display:flex;gap:0;border:1px solid var(--line-2);border-radius:9px;overflow:hidden}
.meta-cell{padding:9px 16px;border-right:1px solid var(--line-2)}
.meta-cell:last-child{border-right:0}
.meta-cell .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt-3)}
.meta-cell .v{font-family:var(--mono);font-size:13px;color:var(--txt);margin-top:3px}
.np{display:flex;align-items:center;gap:12px;margin:14px 2px 10px;font-family:var(--mono);font-size:12px;color:var(--txt-2)}
.np .nowtitle{color:var(--txt)}
.ruler{height:22px;margin:0 2px;border-left:1px solid var(--line-2);border-right:1px solid var(--line-2);
  background:repeating-linear-gradient(90deg,var(--line-2) 0 1px,transparent 1px 40px);
  position:relative;opacity:.6}
.ruler:after{content:"";position:absolute;left:0;bottom:0;width:100%;height:1px;background:var(--line-2)}
.strip-wrap{position:relative;margin-top:8px}
.strip{display:flex;gap:12px;overflow-x:auto;padding:12px 2px 16px;scrollbar-width:thin;scrollbar-color:var(--line-2) transparent}
.strip::-webkit-scrollbar{height:8px}
.strip::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:4px}
.clip{position:relative;flex:0 0 auto;width:184px;cursor:pointer;transition:.16s}
.clip .thumb{position:relative;width:184px;height:104px;border-radius:7px;overflow:hidden;
  border:1px solid var(--line-2);background:#000}
.clip .thumb img{width:100%;height:100%;object-fit:cover;display:block;opacity:.86;transition:.16s}
.clip:hover .thumb img{opacity:1}
.clip.on .thumb{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc),0 8px 26px -12px rgba(255,153,0,.5)}
.clip .cix{position:absolute;top:6px;left:6px;font-family:var(--mono);font-size:10px;background:rgba(8,8,8,.8);
  border:1px solid var(--line-2);border-radius:3px;padding:1px 5px;color:var(--acc)}
.clip .cdur{position:absolute;bottom:6px;right:6px;font-family:var(--mono);font-size:10px;background:rgba(8,8,8,.8);
  border-radius:3px;padding:1px 5px;color:var(--txt)}
.clip .ctitle{margin-top:8px;font-size:12.5px;color:var(--txt-2);line-height:1.3}
.clip.on .ctitle{color:var(--txt)}
.clip.add .thumb{display:flex;align-items:center;justify-content:center;border-style:dashed;background:var(--panel)}
.clip.add .thumb span{font-family:var(--mono);font-size:11px;color:var(--txt-3);letter-spacing:.1em}
.clip.add{cursor:default}
.desc{margin-top:34px;display:grid;grid-template-columns:1.4fr .6fr;gap:34px}
.desc p{color:var(--txt-2)}
.credits{border-left:1px solid var(--line);padding-left:22px}
.credits .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.credits .row .k{color:var(--txt-3);font-family:var(--mono);font-size:11px;letter-spacing:.08em}
.credits .row .v{color:var(--txt)}

/* footer */
.foot{border-top:1px solid var(--line);margin-top:20px}
.foot-in{max-width:1180px;margin:0 auto;padding:26px 24px;display:flex;flex-wrap:wrap;gap:16px;align-items:center}
.socials{display:flex;gap:10px}
.soc{width:38px;height:38px;border:1px solid var(--line-2);border-radius:8px;display:flex;align-items:center;justify-content:center;
  color:var(--txt-2);transition:.16s}
.soc:hover{color:var(--acc);border-color:var(--acc-dim)}
.soc svg{width:17px;height:17px;fill:currentColor}
.soc.imdb{width:auto;height:auto;padding:0;border:0;background:none}
.soc.imdb:hover{opacity:.8}
.soc.off{opacity:.3;cursor:default;pointer-events:none}
.foot .cp{margin-left:auto;text-align:right;font-family:var(--mono);font-size:11px;color:var(--txt-3);white-space:nowrap}
.foot .logo-mark{height:38px}

.note{max-width:1180px;margin:0 auto;padding:0 24px 40px}
.note .card{background:var(--panel);border:1px dashed var(--acc-dim);border-radius:10px;padding:16px 18px;
  font-size:13px;color:var(--txt-2)}
.note .card b{color:var(--acc);font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase}

@media(max-width:900px){
  .langs{grid-template-columns:1fr}
  .grid4{grid-template-columns:1fr}
}
@media(max-width:820px){
  .nav{display:none}
  .contact{grid-template-columns:1fr}
  .desc{grid-template-columns:1fr}
  .meta-panel{margin-left:0;width:100%}
  .credits{border-left:0;border-top:1px solid var(--line);padding-left:0;padding-top:18px}
}
</style>
</head>

<script>
const PLAYLIST = [
  { id:"44486250", title:"Introductions", thumb:"https://vumbnail.com/44486250.jpg" },
  { id:"44486249", title:"Day 1", thumb:"https://vumbnail.com/44486249.jpg" },
  { id:"44488494", title:"Day 2", thumb:"https://vumbnail.com/44488494.jpg" },
  { id:"44490705", title:"Day 3", thumb:"https://vumbnail.com/44490705.jpg" },
  { id:"44672504", title:"Day 4", thumb:"https://vumbnail.com/44672504.jpg" },
  { id:"44540324", title:"Day 5", thumb:"https://vumbnail.com/44540324.jpg" },
  { id:"45090077", title:"Day 6", thumb:"https://vumbnail.com/45090077.jpg" },
  { id:"45149342", title:"Day 7", thumb:"https://vumbnail.com/45149342.jpg" },
  { id:"45149341", title:"Day 8", thumb:"https://vumbnail.com/45149341.jpg" },
  { id:"45163258", title:"Day 9", thumb:"https://vumbnail.com/45163258.jpg" },
  { id:"45167918", title:"Day 10", thumb:"https://vumbnail.com/45167918.jpg" }
];
const ACCENT='FF9900';
function embed(id){ return `https://player.vimeo.com/video/${id}?autoplay=1&title=0&byline=0&portrait=0&badge=0&dnt=1&pip=0&color=${ACCENT}`; }
let cur=0;
function setMeta(i){ const v=PLAYLIST[i]; document.getElementById('wTitle').textContent=v.title;
  document.getElementById('wPos').textContent=String(i+1).padStart(2,'0')+' / '+String(PLAYLIST.length).padStart(2,'0'); }
function shell(v){ return `<div class="poster" id="wPoster" style="background-image:url('${v.thumb}')"></div>
  <div class="scrim"></div>
  <span class="frame-tick ft-tl"></span><span class="frame-tick ft-tr"></span>
  <span class="frame-tick ft-bl"></span><span class="frame-tick ft-br"></span>
  <button class="play" onclick="playCurrent()" aria-label="Play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
  <div class="xhair"><span class="n"></span><span class="s"></span><span class="e"></span><span class="w"></span></div>`; }
function playCurrent(){ document.getElementById('watchPlayer').innerHTML=`<iframe allow="autoplay; fullscreen" allowfullscreen src="${embed(PLAYLIST[cur].id)}"></iframe>`; }
function selectVideo(i, play){ cur=i; const v=PLAYLIST[i]; const p=document.getElementById('watchPlayer');
  p.innerHTML = play ? `<iframe allow="autoplay; fullscreen" allowfullscreen src="${embed(v.id)}"></iframe>` : shell(v);
  setMeta(i); document.querySelectorAll('#relStrip .clip').forEach((c,ci)=>c.classList.toggle('on',ci===i));
  window.scrollTo({top:0,behavior:'smooth'}); }
function buildStrip(){ const strip=document.getElementById('relStrip'); strip.innerHTML='';
  PLAYLIST.forEach((v,i)=>{ const el=document.createElement('div'); el.className='clip'+(i===cur?' on':'');
    el.onclick=()=>selectVideo(i,true);
    el.innerHTML=`<div class="thumb"><img src="${v.thumb}" alt="" loading="lazy"></div><div class="ctitle">${v.title}</div>`;
    strip.appendChild(el); });
  }
document.getElementById('wPoster').style.backgroundImage=`url('${PLAYLIST[0].thumb}')`;
setMeta(0); buildStrip();
/* tune-in removed on this page (home page only) */
(function tc(){ let s=0; setInterval(()=>{ s++; const hh=String(Math.floor(s/3600)%24).padStart(2,'0'),mm=String(Math.floor(s/60)%60).padStart(2,'0'),ss=String(s%60).padStart(2,'0'),ff=String(s%24).padStart(2,'0'); const el=document.getElementById('tc'); if(el) el.textContent=`${hh}:${mm}:${ss}:${ff}`; },1000); })();
</script>
